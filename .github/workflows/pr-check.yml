name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  build-cpp:
    name: Build C++ Project (${{ matrix.os }})
    if: >-
      github.event_name == 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            configure_args: -A x64 -DCMAKE_BUILD_TYPE=Release
            build_args: --config Release --parallel
            artifact_name: tenbox-build-windows
            artifact_path: build/Release/*.exe
          - os: ubuntu-latest
            configure_args: -DCMAKE_BUILD_TYPE=Release
            build_args: --parallel
            artifact_name: tenbox-build-linux-x64
            artifact_path: build/tenbox-vm-runtime
          - os: ubuntu-24.04-arm
            configure_args: -DCMAKE_BUILD_TYPE=Release
            build_args: --parallel
            artifact_name: tenbox-build-linux-arm64
            artifact_path: build/tenbox-vm-runtime
    steps:
      - uses: actions/checkout@v4

      - name: Check src changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            src:
              - 'src/**'
              - 'CMakeLists.txt'
              - 'tests/**'

      - name: Configure CMake
        if: steps.changes.outputs.src == 'true'
        run: cmake -B build ${{ matrix.configure_args }}

      - name: Build
        if: steps.changes.outputs.src == 'true'
        run: cmake --build build ${{ matrix.build_args }}

      - name: Upload build artifacts
        if: steps.changes.outputs.src == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

      - name: Skip notice
        if: steps.changes.outputs.src != 'true'
        run: echo "No changes in src/, skipping C++ build."

  build-website:
    name: Build Website
    if: >-
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check website changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            website:
              - 'website/**'

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.website == 'true'
        with:
          node-version: 20

      - name: Install dependencies
        if: steps.changes.outputs.website == 'true'
        run: npm install
        working-directory: website

      - name: Build
        if: steps.changes.outputs.website == 'true'
        run: npm run build
        working-directory: website

      - name: Skip notice
        if: steps.changes.outputs.website != 'true'
        run: echo "No changes in website/, skipping website build."
